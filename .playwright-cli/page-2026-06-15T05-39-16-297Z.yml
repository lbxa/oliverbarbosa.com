          - generic [ref=e59]:
            - generic [ref=e60]:
              - heading "What" [level=4] [ref=e61]
              - list [ref=e62]:
                - listitem [ref=e63]: Designed a remediation strategy for the contaminated site in Camellia, NSW, intended for a light rail stabling yard and maintenance facility.
                - listitem [ref=e64]: Designed a concrete water tank to supply future residential developments and provide emergency fire support.
                - listitem [ref=e65]: Conceptualised a detailed design of retaining walls and a 33-pile foundation system socketed into shale bedrock.
            - generic [ref=e66]:
              - heading "How" [level=4] [ref=e67]
              - list [ref=e68]:
                - listitem [ref=e69]: Screened 15+ remediation technologies via FRTR guidelines and cost-benefit analysis.
                - listitem [ref=e70]: Modelled tank geometry through sketches; calculated flexural capacity and added horizontal stiffeners to ensure stability without thickening walls.
                - listitem [ref=e71]: Calculated lateral earth pressures, verified wall deflection, and designed 33 bored piles with end-bearing into shale.
            - generic [ref=e72]:
              - heading "Result" [level=4] [ref=e73]
              - list [ref=e74]:
                - listitem [ref=e75]: Recommended Monitored Natural Attenuation (MNA) for lowest cost and minimal site disturbance.
                - listitem [ref=e76]: Delivered a water tank with 451.7 kN/m moment capacity while reducing wall thickness and construction costs.
                - listitem [ref=e77]: Designed a pile system supporting a 48 MN vertical load with settlement under 4 mm, using a hexagonal grid for even load distribution.
